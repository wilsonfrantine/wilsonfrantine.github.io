name: Deploy to GitHub Pages

on:
  # Dispara o deploy apenas na branch principal
  push:
    branches:
      - main
  # Permite rodar o deploy manualmente pela aba Actions, se necessário
  workflow_dispatch:

# Permissões necessárias para que a Action consiga publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas um deploy simultâneo (evita problemas se fizer vários commits rápidos)
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "." # Caminho raiz onde o código está localizado
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Força o uso do Node 24 para evitar avisos de depreciação

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          path: ${{ env.BUILD_PATH }}
          node-version: 22

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
